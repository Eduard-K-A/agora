<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ely Sales Agent</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        background: transparent;
        font-family: Segoe UI, system-ui, sans-serif;
        scrollbar-width: none;
      }

      #root {
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: none;
      }

      .overlay-shell {
        scrollbar-width: none;
        overflow: visible;
        transform-origin: top center;
        transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      #root::-webkit-scrollbar,
      .overlay-shell::-webkit-scrollbar {
        display: none;
      }

      button,
      .ui-button {
        cursor: pointer;
        transform: translateY(0) scale(1);
        transition: all 0.25s ease-in-out;
      }

      .ui-button:not(:disabled):hover {
        transform: translateY(-1px) scale(1.015);
      }

      .primary-control:not(:disabled):hover {
        background: rgba(219, 234, 254, 0.96) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.94), 0 10px 22px rgba(59, 130, 246, 0.19) !important;
      }

      .listening-toggle.is-active {
        background: rgba(254, 242, 242, 0.84) !important;
        border-color: rgba(252, 165, 165, 0.42) !important;
        color: #b91c1c !important;
      }

      .secondary-control:not(:disabled):hover {
        background: rgba(255, 255, 255, 0.94) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84), 0 5px 13px rgba(15, 23, 42, 0.06) !important;
      }

      .window-close-button:not(:disabled):hover {
        background: rgba(254, 226, 226, 0.92) !important;
        color: rgb(220, 38, 38) !important;
        box-shadow: 0 0 12px rgba(239, 68, 68, 0.6) !important;
      }

      .ui-button:not(:disabled):active {
        transform: translateY(0) scale(0.97);
      }

      .ui-button:disabled {
        transform: none;
      }

      .capture-status,
      .capture-status-dot {
        transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      .capture-status.is-loading {
        animation: statusPulse 1.3s ease-in-out infinite;
      }

      .dashboard-view {
        opacity: 1;
        transform: scale(1);
        animation: dashboardEnter 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .bubble-stage {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        transform-origin: top center;
        animation: bubbleEnter 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .floating-sphere {
        position: relative;
        isolation: isolate;
        width: 124px;
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        box-shadow:
          0 18px 42px rgba(15, 23, 42, 0.12),
          0 5px 16px rgba(59, 130, 246, 0.08),
          inset 0 1px 2px rgba(255, 255, 255, 0.92),
          inset 0 -6px 18px rgba(226, 232, 240, 0.28);
        -webkit-app-region: drag;
        transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .floating-sphere.is-idle {
        animation: sphereIdle 3.2s ease-in-out infinite;
      }

      .floating-sphere.is-active {
        animation: sphereLive 1.45s ease-in-out infinite;
      }

      .sphere-aura {
        position: absolute;
        inset: 13px;
        z-index: -1;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(191, 219, 254, 0.34), rgba(255, 255, 255, 0) 68%);
        filter: blur(3px);
      }

      .sphere-core {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        color: #334155;
        pointer-events: none;
      }

      .sphere-status-dot {
        width: 8px;
        height: 8px;
        margin-bottom: 4px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 10px rgba(34, 197, 94, 0.62);
      }

      .sphere-label {
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .sphere-state {
        max-width: 76px;
        color: #475569;
        font-size: 10px;
        font-weight: 600;
        text-transform: capitalize;
        overflow-wrap: break-word;
        text-align: center;
      }

      .sphere-stop {
        position: absolute;
        bottom: 10px;
        padding: 3px 9px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        color: #475569;
        font-size: 10px;
        font-weight: 600;
        -webkit-app-region: no-drag;
      }

      .sphere-stop:hover {
        background: rgba(254, 226, 226, 0.82);
        color: #dc2626;
        box-shadow: 0 0 12px rgba(239, 68, 68, 0.2);
      }

      .bubble-response-panel {
        width: 352px;
        margin-top: 12px;
        padding: 16px;
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        box-shadow:
          0 18px 48px rgba(15, 23, 42, 0.12),
          inset 0 1px 1px rgba(255, 255, 255, 0.82);
        overflow-wrap: break-word;
        animation: panelUnroll 0.38s cubic-bezier(0.25, 1, 0.5, 1);
        -webkit-app-region: no-drag;
      }

      .response-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 13px;
      }

      .response-eyebrow {
        color: #64748b;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .response-title {
        margin-top: 3px;
        color: #334155;
        font-size: 16px;
        font-weight: 700;
      }

      .response-stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .response-refresh {
        animation: responseCrossfade 0.3s ease-in-out;
      }

      .response-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 2px;
      }

      .response-chip {
        padding: 5px 9px;
        border-radius: 999px;
        background: rgba(219, 234, 254, 0.62);
        color: #2563eb;
        font-size: 11px;
        font-weight: 650;
      }

      .response-confidence {
        color: #64748b;
        font-size: 11px;
        font-weight: 600;
      }

      .response-block {
        padding: 9px 10px;
        border-radius: 12px;
        background: rgba(248, 250, 252, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.48);
      }

      .response-block span {
        color: #64748b;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .response-block p {
        margin: 5px 0 0;
        color: #334155;
        font-size: 12px;
        line-height: 1.45;
        overflow-wrap: break-word;
      }

      .response-block.is-highlight {
        background: rgba(239, 246, 255, 0.7);
      }

      .response-block.is-summary {
        margin-top: 10px;
      }

      .response-alert {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 11px;
        line-height: 1.45;
        overflow-wrap: break-word;
      }

      .response-alert.is-warning {
        background: rgba(254, 243, 199, 0.54);
        color: #92400e;
      }

      .response-alert.is-error {
        background: rgba(254, 226, 226, 0.68);
        color: #b91c1c;
      }

      @keyframes statusPulse {
        0%, 100% {
          opacity: 0.72;
        }

        50% {
          opacity: 1;
        }
      }

      @keyframes dashboardEnter {
        from {
          opacity: 0;
          transform: scale(0.96);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes bubbleEnter {
        from {
          opacity: 0;
          transform: scale(0.9);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes sphereIdle {
        0%, 100% {
          transform: scale(1);
          box-shadow:
            0 18px 42px rgba(15, 23, 42, 0.12),
            0 5px 16px rgba(59, 130, 246, 0.08),
            inset 0 1px 2px rgba(255, 255, 255, 0.92);
        }

        50% {
          transform: scale(1.025);
          box-shadow:
            0 21px 46px rgba(15, 23, 42, 0.13),
            0 7px 21px rgba(96, 165, 250, 0.12),
            inset 0 1px 2px rgba(255, 255, 255, 0.94);
        }
      }

      @keyframes sphereLive {
        0%, 100% {
          transform: scale(1.008);
          box-shadow:
            0 19px 45px rgba(15, 23, 42, 0.13),
            0 7px 23px rgba(96, 165, 250, 0.18),
            inset 0 1px 2px rgba(255, 255, 255, 0.94);
        }

        50% {
          transform: scale(1.02);
          box-shadow:
            0 24px 54px rgba(15, 23, 42, 0.14),
            0 10px 31px rgba(96, 165, 250, 0.28),
            inset 0 1px 2px rgba(255, 255, 255, 0.96);
        }
      }

      @keyframes panelUnroll {
        from {
          opacity: 0;
          transform: translateY(-14px) scale(0.98);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes responseCrossfade {
        from {
          opacity: 0;
          transform: translateY(4px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./overlay.tsx"></script>
  </body>
</html>
