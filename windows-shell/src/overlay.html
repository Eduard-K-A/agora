<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clicky Sales Agent</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        background: transparent;
        font-family: Segoe UI, system-ui, sans-serif;
        scrollbar-width: none;
      }

      #root {
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: none;
      }

      .overlay-shell {
        scrollbar-width: none;
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      #root::-webkit-scrollbar,
      .overlay-shell::-webkit-scrollbar {
        display: none;
      }

      .ui-button {
        transform: translateY(0) scale(1);
        transition: all 0.2s ease-in-out;
      }

      .ui-button:not(:disabled):hover {
        transform: translateY(-1px) scale(1.015);
      }

      .ui-button:not(:disabled):active {
        transform: translateY(0) scale(0.97);
      }

      .ui-button:disabled {
        transform: none;
      }

      .mic-toggle.is-recording {
        animation: recordingPulse 1.4s ease-in-out infinite;
      }

      @keyframes recordingPulse {
        0%, 100% {
          box-shadow: 0 10px 24px rgba(248,113,113,0.22), inset 0 1px 0 rgba(255,255,255,0.9);
        }

        50% {
          box-shadow: 0 12px 30px rgba(248,113,113,0.38), inset 0 1px 0 rgba(255,255,255,0.9);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./overlay.tsx"></script>
  </body>
</html>
