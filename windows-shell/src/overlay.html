<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ely Sales Agent</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        background: transparent;
        font-family: Segoe UI, system-ui, sans-serif;
        scrollbar-width: none;
      }

      #root {
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: none;
      }

      .overlay-shell {
        scrollbar-width: none;
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      #root::-webkit-scrollbar,
      .overlay-shell::-webkit-scrollbar {
        display: none;
      }

      .ui-button {
        transform: translateY(0) scale(1);
        transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      .ui-button:not(:disabled):hover {
        transform: translateY(-1px) scale(1.015);
      }

      .primary-control:not(:disabled):hover {
        background: rgba(219, 234, 254, 0.96) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.94), 0 10px 22px rgba(59, 130, 246, 0.19) !important;
      }

      .secondary-control:not(:disabled):hover {
        background: rgba(255, 255, 255, 0.76) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84), 0 5px 13px rgba(15, 23, 42, 0.06) !important;
      }

      .window-close-button:not(:disabled):hover {
        background: rgba(254, 226, 226, 0.92) !important;
        color: rgb(220, 38, 38) !important;
        box-shadow: 0 0 12px rgba(239, 68, 68, 0.6) !important;
      }

      .ui-button:not(:disabled):active {
        transform: translateY(0) scale(0.97);
      }

      .ui-button:disabled {
        transform: none;
      }

      .capture-status,
      .capture-status-dot {
        transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      .capture-status.is-loading {
        animation: statusPulse 1.3s ease-in-out infinite;
      }

      @keyframes statusPulse {
        0%, 100% {
          opacity: 0.72;
        }

        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./overlay.tsx"></script>
  </body>
</html>
